# Farm registry portal (static) → Artifact Registry → Cloud Run
#
# From monorepo root:
#   gcloud builds submit farm-registry-portal --config farm-registry-portal/cloudbuild.yaml
#
# To point the SPA at different API hosts, override substitutions:
#   gcloud builds submit farm-registry-portal --config farm-registry-portal/cloudbuild.yaml \
#     --substitutions=_VITE_LOGIN_API_URL=https://your-login-host.run.app,_VITE_FARM_API_URL=https://your-farm-api.run.app

substitutions:
  _REGION: europe-west1
  _SERVICE_NAME: farm-registry-portal
  _AR_REPO_PATH: cloud-run-source-deploy/techretainerai-poultrymaster_api
  _VITE_LOGIN_API_URL: https://poultrymaster-api-git-1024831506678.europe-west1.run.app
  _VITE_FARM_API_URL: https://poultrymaster-farm-api-git-1024831506678.europe-west1.run.app

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "--build-arg=VITE_LOGIN_API_URL=$_VITE_LOGIN_API_URL"
      - "--build-arg=VITE_FARM_API_URL=$_VITE_FARM_API_URL"
      - "-t"
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO_PATH/$_SERVICE_NAME:$BUILD_ID
      - "-t"
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO_PATH/$_SERVICE_NAME:latest
      - "-f"
      - Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO_PATH/$_SERVICE_NAME:$BUILD_ID

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO_PATH/$_SERVICE_NAME:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - "--image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO_PATH/$_SERVICE_NAME:$BUILD_ID"
      - "--region=$_REGION"
      - "--platform=managed"
      - "--port=8080"
      - "--allow-unauthenticated"
      - "--quiet"

options:
  logging: CLOUD_LOGGING_ONLY
